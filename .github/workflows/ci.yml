name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run vet
        run: go vet ./...

      - name: Build release binaries
        run: bash scripts/build-release.sh ci

      - name: Build npm package
        run: bash scripts/build-npm-package.sh ci

      - name: Smoke npm package
        run: bash scripts/smoke-npm-package.sh
